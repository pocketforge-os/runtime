code = "BTN_X"
label = "X"
skin_part = "btn_west"
[[inputs]]
id = "north"
kind = "button"
ev_type = "EV_KEY"
code = "BTN_Y"
label = "Y"
skin_part = "btn_north"
[[inputs]]
id = "select"
kind = "button"
ev_type = "EV_KEY"
code = "BTN_SELECT"
skin_part = "btn_select"
[[inputs]]
id = "guide"
kind = "button"
ev_type = "EV_KEY"
code = "BTN_MODE"
skin_part = "btn_guide"
[[inputs]]
id = "start"
kind = "button"
ev_type = "EV_KEY"
code = "BTN_START"
skin_part = "btn_start"
[[inputs]]
id = "l1"
kind = "button"
ev_type = "EV_KEY"
code = "BTN_TL"
skin_part = "btn_l1"
[[inputs]]
id = "r1"
kind = "button"
ev_type = "EV_KEY"
