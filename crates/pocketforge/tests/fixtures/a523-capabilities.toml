# ---- ... PLUS the Pro S-only PURE ADDED ROWS ----
# Home: a dedicated system button physically NEXT TO POWER (Steam Deck HQ / FCC photos) —
# i.e. a system key, NOT the gamepad's guide (BTN_MODE, already mapped above). Authored as
# KEY_HOMEPAGE; the exact code + which evdev node it lands on is a SPIKE-0 ground-truth item.
[[inputs]]
id = "home"
kind = "button"
ev_type = "EV_KEY"
code = "KEY_HOMEPAGE"
skin_part = "btn_home"
# Clickable thumbsticks (L3/R3) — the press of the existing sticks (lights the stick part).
[[inputs]]
id = "l3"
kind = "stick-click"
ev_type = "EV_KEY"
code = "BTN_THUMBL"
skin_part = "stick_l"
[[inputs]]
id = "r3"
kind = "stick-click"
ev_type = "EV_KEY"
code = "BTN_THUMBR"
skin_part = "stick_r"

# ---- SENSORS (Pro S-only) ----
# 6-axis IMU. SPIKE-0 must confirm the qmi8658 actually BINDS (DT-but-unbound is the R3
# hazard); mag (mmc5603) + GNSS are intentionally OMITTED until proven bound.
[[sensors]]
id = "imu"
kind = "accel+gyro"
iio_device = "qmi8658"
units = "m/s^2,rad/s"
ui = "tilt_bubble"
mount_matrix = [[1, 0, 0], [0, 1, 0], [0, 0, 1]]   # identity until SPIKE-0 measures the real mount

# ---- ACTUATORS ----
# Rumble (Pro S-only) — single pwm-vibrator motor (§17).
[[actuators]]
id = "rumble"
kind = "rumble"
ev_type = "EV_FF"
code = "FF_RUMBLE"
sysfs = "pwm-vibrator"
# LEDs — DIFFERENT controller IC than the base (ledc/led_anim vs sunxi_led); ~17 LEDs.
# A real hardware difference carried as DATA (count + controller), not a code branch.
[[actuators]]
id = "leds"
kind = "led_array"
controller = "ledc"
count = 17

