y = { min = -32768, max = 32767, fuzz = 16, flat = 128 }
[[inputs]]
id = "ltrig"
kind = "trigger"
ev_type = "EV_ABS"
code = "ABS_Z"
ui = "slider_above"
skin_part = "trig_l"
